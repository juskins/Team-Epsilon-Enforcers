spring:
  application:
    name: wastewatch-api

  session:
    store-type: none

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 10000
      initialization-fail-timeout: 10000
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      url: redis://localhost:6379

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://zucvbrcgebdmyrxhyrbm.supabase.co/auth/v1/.well-known/jwks.json

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins:
      - http://localhost:3000

# ← ADDED: Supabase project URL for JWT issuer validation
supabase:
  project-url: ${SUPABASE_PROJECT_URL}

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG